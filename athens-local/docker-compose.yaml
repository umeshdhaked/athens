version: '3.8'
services:
  localstack:
    container_name: "${LOCALSTACK_DOCKER_NAME:-localstack-main}"
    image: localstack/localstack
    ports:
      - "127.0.0.1:4566:4566"            # LocalStack Gateway
      - "127.0.0.1:4510-4559:4510-4559"  # external services port range
    environment:
      # LocalStack configuration: https://docs.localstack.cloud/references/configuration/
      - DEBUG=${DEBUG:-0}
    volumes:
      - "${LOCALSTACK_VOLUME_DIR:-./volume/localstack}:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
  athens-dynamodb:
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath ./data"
    image: "amazon/dynamodb-local:latest"
    container_name: athens-dynamodb
    ports:
      - "8000:8000"
    volumes:
      - "./volume/dynamodb:/home/dynamodblocal/data"
    working_dir: /home/dynamodblocal
  athens-redis:
    image: redis:7.2-alpine
    container_name: athens-redis
    ports:
      - "6379:6379"
    volumes:
      - ./volume/redis:/data
  # athens:
  #   container_name: "athens-backend"
  #   image: athens
  #   depends_on:
  #     - localstack
  #     - athens-dynamodb
  #     - athens-redis
  #   ports:
  #     - "127.0.0.1:8080:8080"
  #   environment:
  #     APP_ENV: 'docker'
  app-node:
    image: amazon/aws-cli
    container_name: app-node
    depends_on:
      - athens-dynamodb
      - localstack
    ports:
      - "9080:9080"
    environment:
      AWS_REGION: ap-south-1
      AWS_ACCESS_KEY_ID: 'DUMMY'
      AWS_SECRET_ACCESS_KEY: 'DUMMY'
    command:
#      dynamodb describe-limits --endpoint-url http://athens-dynamodb:8000 --region ap-south-1
      dynamodb list-tables --endpoint-url http://athens-dynamodb:8000 --region ap-south-1
#      dynamodb scan --table-name otp --endpoint-url http://athens-dynamodb:8000 --region ap-south-1
